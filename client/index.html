<!DOCTYPE html>
<html>
<head>
	<title>Pokemon API Test</title>
</head>
<body>
	<h1>Pokemon API Test</h1>

	<label for="type1">Select a primary type:</label>

	<select name="primary_type" id="type1">
		<option value="null">-- select --</option>
		<option value="normal">Normal</option>
		<option value="fire">Fire</option>
		<option value="water">Water</option>
		<option value="electric">Electric</option>
		<option value="grass">Grass</option>
		<option value="ice">Ice</option>
		<option value="fighting">Fighting</option>
		<option value="poison">Poison</option>
		<option value="ground">Ground</option>
		<option value="flying">Flying</option>
		<option value="psychic">Psychic</option>
		<option value="bug">Bug</option>
		<option value="rock">Rock</option>
		<option value="ghost">Ghost</option>
		<option value="dragon">Dragon</option>
	</select>

	<label for="type2">Select a secondary type:</label>

	<select name="secondary_type" id="type2">
		<option value="null">-- select --</option>
		<option value="normal">Normal</option>
		<option value="fire">Fire</option>
		<option value="water">Water</option>
		<option value="electric">Electric</option>
		<option value="grass">Grass</option>
		<option value="ice">Ice</option>
		<option value="fighting">Fighting</option>
		<option value="poison">Poison</option>
		<option value="ground">Ground</option>
		<option value="flying">Flying</option>
		<option value="psychic">Psychic</option>
		<option value="bug">Bug</option>
		<option value="rock">Rock</option>
		<option value="ghost">Ghost</option>
		<option value="dragon">Dragon</option>
	</select>

	<button id="load">Load Filtered Pokemon</button>

	<pre id="output"></pre>

	<script>
		const output = document.getElementById('output');

		document.getElementById('load').addEventListener('click', async () => {
			const primaryType = document.getElementById('type1').value;
			const secondaryType = document.getElementById('type2').value;

			let url = '/pokemon';
			if (primaryType !== 'null') {
				url += `?primary_type=${primaryType}`;
			}
			if (secondaryType !== 'null') {
				url += `${url.includes('?') ? '&' : '?'}secondary_type=${secondaryType}`;
			}
			console.log('Fetching from URL:', url);
			const res = await fetch(url);
			const data = await res.json();
			output.textContent = JSON.stringify(data, null, 2);
		});

		document.getElementById('loadFire').addEventListener('click', async () => {
			const res = await fetch('/pokemon?type=Fire');
			const data = await res.json();
			output.textContent = JSON.stringify(data, null, 2);
		});
	</script>
</body>
</html>
